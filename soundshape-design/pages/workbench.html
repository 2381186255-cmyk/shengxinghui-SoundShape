    <style id="theme-vars">
/* 墨画态 / 雷霆态 Design Tokens */

/* ========== INK (Light) Theme (default / :root) ========== */
:root {
  --background: #f3e9d2;
  --foreground: #1a1410;
  --card: #ede0c4;
  --card-foreground: #1a1410;
  --muted: #c9b896;

  --border: #c9b896;

  --ring: #b8332a;
  --radius: 4px;
  --primary: #b8332a;
  --primary-foreground: #ffffff;
  --secondary: #a87b2c;
  --secondary-foreground: #ffffff;
  --accent: #4a5a6a;
  --accent-foreground: #ffffff;
  --destructive: #8a1f18;
  --destructive-foreground: #ffffff;

  --background-50: #f3e9d2;

  --background-900: #1a1410;

  --brand-50: #f0d5d3;
  --brand-100: #e5b0ac;
  --brand-200: #d08a83;
  --brand-300: #b8332a;
  --brand-400: #b8332a;
  --brand-500: #b8332a;

  --text-50: #f3e9d2;

  --text-600: #3d3328;
  --text-700: #2d2318;
  --text-800: #1a1410;
  --text-900: #0d0a08;

  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 18px;
}

/* ========== THUNDER (Dark) Theme ========== */
.dark {
  --background: #050810;
  --foreground: #d6f7ff;
  --card: #0a1020;
  --card-foreground: #d6f7ff;
  --muted: #0f1830;
  --muted-foreground: #6a8a99;
  --border: rgba(0, 229, 255, 0.35);
  --input: #050810;
  --ring: #00e5ff;
  --radius: 0px;
  --primary: #00e5ff;
  --primary-foreground: #020407;
  --secondary: #ff2bd6;
  --secondary-foreground: #020407;
  --accent: #ffb800;
  --accent-foreground: #020407;
  --destructive: #ff3366;
  --destructive-foreground: #020407;

  --background-50: #020407;
  --background-100: #050810;
  --background-200: #0a1020;
  --background-300: #0f1830;
  --background-400: #142040;
  --background-500: #1a2850;
  --background-600: #203060;
  --background-700: #264070;
  --background-800: #305090;
  --background-900: #5070b0;

  --brand-50: #e0f7ff;
  --brand-100: #b0eaff;
  --brand-200: #80ddff;
  --brand-300: #00e5ff;
  --brand-400: #00e5ff;
  --brand-500: #00e5ff;
  --brand-600: #00b8cc;
  --brand-700: #008a99;

  --text-50: #d6f7ff;
  --text-100: #c0e8ff;
  --text-200: #9ad4f0;
  --text-300: #6a8a99;
  --text-400: #4a6a7a;
  --text-500: #3a5a6a;
  --text-600: #2a4a5a;
  --text-700: #1a3a4a;
  --text-800: #0a2a3a;
  --text-900: #020407;

  --radius-sm: 0px;
  --radius-md: 0px;
  --radius-lg: 0px;

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-foreground: var(--card-foreground);
  }
  @layer base {
    body { background: var(--card-background); color: var(--card-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
        <style>
      ::-webkit-scrollbar { width: 0 !important; height: 0 !important; }
      html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
  <div class="paper-grain"></div>
  <div class="page-content">
    <!-- Top Navigation -->
    <nav class="top-nav">
      <a href="home.html" class="nav-logo font-display" data-dom-id="nav-home">◆ 声形绘</a>
      <div class="nav-actions">
        <a href="login.html" class="nav-link" data-dom-id="nav-login">登录</a>
        <button class="btn-toggle-theme" data-dom-id="btn-toggle-theme">雷霆</button>
      </div>
    </nav>

    <!-- Step Indicator -->
    <div class="step-indicator">
      第一步：画形状生成键位
      <br>
      <span class="step-badge font-seal">画形造器</span>
    </div>

    <hr class="divider">

    <!-- Drawing Canvas -->
    <div class="canvas-wrapper">
      <div class="canvas-area">
        <div class="canvas-placeholder">
          <span class="canvas-placeholder-icon">✎</span>
          在此画出乐器形状
        </div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <button class="tool-pill active">方块</button>
      <button class="tool-pill">竖线</button>
      <button class="tool-pill">横线</button>
      <button class="tool-pill">圆形</button>
      <button class="tool-pill">清空</button>
      <button class="tool-pill">撤销</button>
      <button class="tool-pill">模板</button>
    </div>

    <!-- Hint Text -->
    <div class="hint-text">
      <div class="hint-card">
        画一排方块 = 钢琴<br>
        画6条竖线 = 吉他<br>
        画5个圆 = 架子鼓<br>
        画4条横线 = 长笛<br>
        画弧形线 = 小提琴
      </div>
    </div>

    <!-- CTA Button -->
    <div class="cta-section">
      <a href="workbench-result.html" class="btn-primary" data-dom-id="btn-generate">生成键位并开始演奏</a>
    </div>
  </div>

    <style>
    :root {
      --ink-paper: #f3e9d2;
      --ink-paper-edge: #e2d4b0;
      --ink-ink: #1a1410;
      --ink-ink-soft: #3d3328;
      --ink-cinnabar: #b8332a;
      --ink-cinnabar-deep: #8a1f18;
      --ink-gold: #a87b2c;
      --ink-mountain: #6b5d4a;
      --ink-water: #4a5a6a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Serif SC', serif;
      background: var(--ink-paper);
      color: var(--ink-ink);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none;
    }
    .font-display { font-family: 'Ma Shan Zheng', cursive; }
    .font-seal { font-family: 'ZCOOL QingKe HuangYou', cursive; letter-spacing: 0.3em; }

    .paper-grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.5;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.4  0 0 0 0 0.32  0 0 0 0 0.2  0 0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
      mix-blend-mode: multiply;
    }

    .page-content { position: relative; z-index: 2; width: 100%; padding: 0 20px; }

    /* Top Nav */
    .top-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; border-bottom: 2px solid var(--ink-ink);
      position: relative;
    }
    .top-nav::after {
      content: ''; position: absolute; bottom: 5px; left: 10%; right: 10%;
      border-bottom: 1px dashed var(--ink-cinnabar);
    }
    .nav-logo { font-family: 'Ma Shan Zheng', cursive; font-size: 22px; color: var(--ink-ink); text-decoration: none; }
    .nav-actions { display: flex; gap: 12px; align-items: center; }
    .nav-link {
      font-family: 'Noto Serif SC', serif; font-size: 13px; color: var(--ink-ink-soft);
      text-decoration: none; padding: 6px 12px; border: 1px solid var(--ink-paper-edge);
      border-radius: 4px; transition: all 0.3s;
    }
    .nav-link:hover { border-color: var(--ink-cinnabar); color: var(--ink-cinnabar); transform: translateY(-2px); }
    .btn-toggle-theme {
      font-family: 'ZCOOL QingKe HuangYou', cursive; font-size: 12px;
      letter-spacing: 0.2em; padding: 4px 14px; border-radius: 20px;
      border: 1.5px solid var(--ink-cinnabar); color: var(--ink-cinnabar);
      background: transparent; cursor: pointer; transition: all 0.3s;
    }
    .btn-toggle-theme:hover { background: var(--ink-cinnabar); color: #fff; }

    /* Step Indicator */
    .step-indicator {
      text-align: center; padding: 24px 0 16px;
      font-family: 'Ma Shan Zheng', cursive; font-size: 20px;
      color: var(--ink-ink);
    }
    .step-badge {
      display: inline-block; font-family: 'ZCOOL QingKe HuangYou', cursive;
      font-size: 11px; letter-spacing: 0.3em; color: var(--ink-cinnabar);
      border: 1.5px solid var(--ink-cinnabar); padding: 4px 16px; margin-top: 8px;
      border-radius: 2px;
    }

    /* Drawing Canvas Area */
    .canvas-wrapper {
      padding: 20px 0;
    }
    .canvas-area {
      width: 100%; height: 320px;
      background: var(--ink-paper-edge);
      border: 2px dashed var(--ink-cinnabar);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .canvas-area::before {
      content: ''; position: absolute; inset: 6px;
      border: 1px solid var(--ink-ink); opacity: 0.3;
    }
    .canvas-placeholder {
      font-family: 'Noto Serif SC', serif; font-size: 16px;
      color: var(--ink-mountain); text-align: center;
      line-height: 1.8;
    }
    .canvas-placeholder-icon { font-size: 36px; display: block; margin-bottom: 8px; }

    /* Toolbar */
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
      padding: 16px 0;
    }
    .tool-pill {
      font-family: 'ZCOOL QingKe HuangYou', cursive; font-size: 12px;
      letter-spacing: 0.2em; color: var(--ink-ink-soft);
      border: 1.5px solid var(--ink-ink); background: rgba(255,255,255,0.5);
      padding: 6px 16px; border-radius: 20px; cursor: pointer;
      transition: all 0.3s; position: relative;
    }
    .tool-pill::after {
      content: ''; position: absolute; inset: 2px;
      border: 1px dashed var(--ink-cinnabar); border-radius: 18px;
      pointer-events: none; opacity: 0; transition: opacity 0.3s;
    }
    .tool-pill:hover {
      border-color: var(--ink-cinnabar); color: var(--ink-cinnabar);
      transform: translateY(-2px); box-shadow: 0 3px 8px rgba(184,51,42,0.15);
    }
    .tool-pill:hover::after { opacity: 1; }
    .tool-pill.active {
      background: var(--ink-cinnabar); color: #fff; border-color: var(--ink-cinnabar);
    }
    .tool-pill.active::after { opacity: 0; }

    /* Hint Text */
    .hint-text {
      text-align: center; padding: 12px 0 20px;
      font-size: 13px; color: var(--ink-mountain); line-height: 1.8;
    }
    .hint-card {
      background: rgba(255,255,255,0.5); border: 1.5px solid var(--ink-ink);
      border-radius: 4px; padding: 16px 20px; margin: 0 20px;
      position: relative;
    }
    .hint-card::after {
      content: ''; position: absolute; inset: 3px;
      border: 1px dashed var(--ink-cinnabar); pointer-events: none;
    }

    /* CTA Button */
    .cta-section { padding: 8px 0 30px; }
    .btn-primary {
      font-family: 'Ma Shan Zheng', cursive; font-size: 20px; letter-spacing: 0.15em;
      background: var(--ink-cinnabar); color: #fff; border: none; border-radius: 4px;
      padding: 14px 24px; cursor: pointer; transition: all 0.3s;
      display: block; width: 100%; text-align: center; text-decoration: none;
    }
    .btn-primary:hover {
      background: var(--ink-cinnabar-deep); transform: translateY(-4px);
      box-shadow: 0 6px 16px rgba(184,51,42,0.3);
    }

    /* Section Divider */
    .divider {
      border: none; border-top: 2px solid var(--ink-ink);
      margin: 0; position: relative;
    }
    .divider::after {
      content: ''; position: absolute; top: 5px; left: 10%; right: 10%;
      border-top: 1px dashed var(--ink-cinnabar);
    }
  </style>
</body>
</html>
