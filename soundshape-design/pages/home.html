    <style id="theme-vars">

/* ========== THUNDER (Dark) Theme ========== */
.dark {
  --background: #050810;
  --foreground: #d6f7ff;

  --ring: #00e5ff;
  --radius: 0px;
  --primary: #00e5ff;
  --primary-foreground: #020407;
  --secondary: #ff2bd6;
  --secondary-foreground: #020407;
  --accent: #ffb800;
  --accent-foreground: #020407;

  --destructive-foreground: #020407;

  --background-50: #020407;
  --background-100: #050810;
  --background-200: #0a1020;
  --background-300: #0f1830;
  --background-400: #142040;
  --background-500: #1a2850;
  --background-600: #203060;
  --background-700: #264070;
  --background-800: #305090;
  --background-900: #5070b0;

  --brand-50: #e0f7ff;
  --brand-100: #b0eaff;
  --brand-200: #80ddff;
  --brand-300: #00e5ff;
  --brand-400: #00e5ff;
  --brand-500: #00e5ff;
  --brand-600: #00b8cc;
  --brand-700: #008a99;

  --text-50: #d6f7ff;
  --text-100: #c0e8ff;
  --text-200: #9ad4f0;
  --text-300: #6a8a99;
  --text-400: #4a6a7a;
  --text-500: #3a5a6a;
  --text-600: #2a4a5a;
  --text-700: #1a3a4a;
  --text-800: #0a2a3a;
  --text-900: #020407;

  --radius-sm: 0px;
  --radius-md: 0px;
  --radius-lg: 0px;
  --radius-xl: 0px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-foreground: var(--card-foreground);
  }
  @layer base {
    body { background: var(--card-background); color: var(--card-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
        <style>
      ::-webkit-scrollbar { width: 0 !important; height: 0 !important; }
      html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }

</head>
<body>
  <div class="paper-grain"></div>
  <div class="page-content">
    <!-- Top Navigation -->
    <nav class="top-nav">
      <a href="home.html" class="nav-logo font-display">◆ 声形绘</a>
      <div class="nav-actions">
        <a href="login.html" class="nav-link" data-dom-id="nav-login">登录</a>
        <a href="profile.html" class="nav-link" data-dom-id="nav-profile">我的</a>
        <button class="btn-toggle-theme" data-dom-id="btn-toggle-theme">雷霆</button>
      </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
      <h1 class="hero-title">声形绘</h1>
      <p class="hero-subtitle">SoundShape</p>
      <p class="hero-tagline">画出来的乐器 · 挥手就能弹</p>
      <div class="hero-seal font-seal">生活娱乐赛道 · 创意报名</div>
      <br>
      <img src="../assets/hero-ink.jpg" alt="声形绘 水墨乐器" class="hero-image">
    </section>

    <!-- How It Works -->
    <section class="how-section">
      <div class="section-label-wrapper">
        <span class="section-label font-seal">使用方式</span>
      </div>
      <div class="flow-steps">
        <div class="flow-step">
          <div class="flow-step-num font-seal">壹</div>
          <div class="flow-step-icon">✎</div>
          <div class="flow-step-text">画出乐器</div>
        </div>
        <div class="flow-step">
          <div class="flow-step-num font-seal">贰</div>
          <div class="flow-step-icon">◎</div>
          <div class="flow-step-text">识别生成</div>
        </div>
        <div class="flow-step">
          <div class="flow-step-num font-seal">叁</div>
          <div class="flow-step-icon">✋</div>
          <div class="flow-step-text">挥手演奏</div>
        </div>
      </div>
    </section>

    <!-- Instrument Cards -->
    <section class="instruments-section">
      <div class="section-label-wrapper">
        <span class="section-label font-seal">支持乐器</span>
      </div>
      <div class="instruments-grid">
        <div class="instrument-card" data-color="piano">
          <div class="instrument-icon">🎹</div>
          <div class="instrument-name">钢琴</div>
        </div>
        <div class="instrument-card" data-color="guitar">
          <div class="instrument-icon">🎸</div>
          <div class="instrument-name">吉他</div>
        </div>
        <div class="instrument-card" data-color="violin">
          <div class="instrument-icon">🎻</div>
          <div class="instrument-name">小提琴</div>
        </div>
        <div class="instrument-card" data-color="flute">
          <div class="instrument-icon">🪈</div>
          <div class="instrument-name">长笛</div>
        </div>
        <div class="instrument-card" data-color="drums">
          <div class="instrument-icon">🥁</div>
          <div class="instrument-name">架子鼓</div>
        </div>
      </div>
    </section>

    <!-- CTA Section -->
    <section class="cta-section">
      <a href="workbench.html" class="btn-primary" data-dom-id="cta-start">开始创作</a>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-seal">声形绘响</div>
      <p class="footer-copy">声形绘 SoundShape &copy; 2026 · 以画入声 以手为器</p>
    </footer>
  </div>

    <style>
    :root {
      --ink-paper: #f3e9d2;
      --ink-paper-edge: #e2d4b0;
      --ink-ink: #1a1410;
      --ink-ink-soft: #3d3328;
      --ink-cinnabar: #b8332a;
      --ink-cinnabar-deep: #8a1f18;
      --ink-gold: #a87b2c;
      --ink-mountain: #6b5d4a;
      --ink-water: #4a5a6a;
      --piano: #b8332a;
      --guitar: #a87b2c;
      --drums: #3d3328;
      --violin: #4a5a6a;
      --flute: #6b8e7a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Serif SC', serif;
      background: var(--ink-paper);
      color: var(--ink-ink);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none;
    }
    .font-display { font-family: 'Ma Shan Zheng', cursive; }
    .font-seal { font-family: 'ZCOOL QingKe HuangYou', cursive; letter-spacing: 0.3em; }

    /* Paper grain overlay */
    .paper-grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.5;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.4  0 0 0 0 0.32  0 0 0 0 0.2  0 0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
      mix-blend-mode: multiply;
    }

    .page-content { position: relative; z-index: 2; width: 100%; padding: 0 20px; }

    /* Top Nav */
    .top-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; border-bottom: 2px solid var(--ink-ink);
      position: relative;
    }
    .top-nav::after {
      content: ''; position: absolute; bottom: 5px; left: 10%; right: 10%;
      border-bottom: 1px dashed var(--ink-cinnabar);
    }
    .nav-logo { font-family: 'Ma Shan Zheng', cursive; font-size: 22px; color: var(--ink-ink); text-decoration: none; }
    .nav-actions { display: flex; gap: 12px; align-items: center; }
    .nav-link {
      font-family: 'Noto Serif SC', serif; font-size: 13px; color: var(--ink-ink-soft);
      text-decoration: none; padding: 6px 12px; border: 1px solid var(--ink-paper-edge);
      border-radius: 4px; transition: all 0.3s;
    }
    .nav-link:hover { border-color: var(--ink-cinnabar); color: var(--ink-cinnabar); transform: translateY(-2px); }
    .btn-toggle-theme {
      font-family: 'ZCOOL QingKe HuangYou', cursive; font-size: 12px;
      letter-spacing: 0.2em; padding: 4px 14px; border-radius: 20px;
      border: 1.5px solid var(--ink-cinnabar); color: var(--ink-cinnabar);
      background: transparent; cursor: pointer; transition: all 0.3s;
    }
    .btn-toggle-theme:hover { background: var(--ink-cinnabar); color: #fff; }

    /* Hero Section */
    .hero {
      text-align: center; padding: 40px 0 30px;
      border-bottom: 2px solid var(--ink-ink); position: relative;
    }
    .hero::after {
      content: ''; position: absolute; bottom: 5px; left: 5%; right: 5%;
      border-bottom: 1px dashed var(--ink-cinnabar);
    }
    .hero-title {
      font-family: 'Ma Shan Zheng', cursive; font-size: 52px; line-height: 1.1;
      color: var(--ink-ink); margin-bottom: 4px;
    }
    .hero-subtitle {
      font-family: 'Noto Serif SC', serif; font-size: 18px; color: var(--ink-ink-soft);
      letter-spacing: 0.15em; margin-bottom: 12px; font-style: italic;
    }
    .hero-tagline {
      font-family: 'Noto Serif SC', serif; font-size: 15px; color: var(--ink-mountain);
      margin-bottom: 20px;
    }
    .hero-seal {
      display: inline-block; font-family: 'ZCOOL QingKe HuangYou', cursive;
      font-size: 11px; letter-spacing: 0.3em; color: var(--ink-cinnabar);
      border: 1.5px solid var(--ink-cinnabar); padding: 6px 18px; margin-bottom: 24px;
      border-radius: 2px;
    }
    .hero-image {
      max-width: 100%; border: 2px solid var(--ink-ink); border-radius: 4px;
      box-shadow: 4px 4px 0 var(--ink-paper-edge); position: relative;
    }
    .hero-image::after {
      content: ''; position: absolute; inset: 4px;
      border: 1px dashed var(--ink-cinnabar); pointer-events: none;
    }

    /* How It Works */
    .how-section { padding: 30px 0; }
    .section-label {
      font-family: 'ZCOOL QingKe HuangYou', cursive; font-size: 12px;
      letter-spacing: 0.3em; color: var(--ink-cinnabar); text-align: center;
      border: 1px solid var(--ink-cinnabar); padding: 4px 16px; display: inline-block;
      margin: 0 auto 20px; border-radius: 2px;
    }
    .section-label-wrapper { text-align: center; }
    .flow-steps { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .flow-step {
      background: rgba(255,255,255,0.6); border: 2px solid var(--ink-ink);
      border-radius: 4px; padding: 16px 14px; text-align: center;
      min-width: 110px; position: relative; transition: all 0.3s;
    }
    .flow-step::after {
      content: ''; position: absolute; inset: 3px;
      border: 1px dashed var(--ink-cinnabar); pointer-events: none;
    }
    .flow-step:hover { transform: translateY(-4px); box-shadow: 0 4px 12px rgba(184,51,42,0.2); }
    .flow-step-icon { font-size: 28px; margin-bottom: 6px; }
    .flow-step-num { font-family: 'ZCOOL QingKe HuangYou', cursive; font-size: 11px; color: var(--ink-cinnabar); letter-spacing: 0.2em; }
    .flow-step-text { font-size: 13px; color: var(--ink-ink-soft); margin-top: 4px; }

    /* Instrument Cards */
    .instruments-section { padding: 20px 0 30px; }
    .instruments-grid { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .instrument-card {
      background: rgba(255,255,255,0.6); border: 2px solid var(--ink-ink);
      border-radius: 4px; padding: 14px 16px; text-align: center;
      min-width: 80px; flex: 1; position: relative; transition: all 0.3s; cursor: pointer;
    }
    .instrument-card::after {
      content: ''; position: absolute; inset: 3px;
      border: 1px dashed var(--ink-cinnabar); pointer-events: none;
    }
    .instrument-card:hover { transform: translateY(-4px); box-shadow: 0 4px 12px rgba(184,51,42,0.2); }
    .instrument-icon { font-size: 30px; margin-bottom: 6px; }
    .instrument-name { font-family: 'Noto Serif SC', serif; font-size: 13px; color: var(--ink-ink); }
    .instrument-card[data-color="piano"] { border-left: 4px solid var(--piano); }
    .instrument-card[data-color="guitar"] { border-left: 4px solid var(--guitar); }
    .instrument-card[data-color="drums"] { border-left: 4px solid var(--drums); }
    .instrument-card[data-color="violin"] { border-left: 4px solid var(--violin); }
    .instrument-card[data-color="flute"] { border-left: 4px solid var(--flute); }

    /* CTA Button */
    .cta-section { text-align: center; padding: 20px 0 30px; }
    .btn-primary {
      font-family: 'Ma Shan Zheng', cursive; font-size: 20px; letter-spacing: 0.15em;
      background: var(--ink-cinnabar); color: #fff; border: none; border-radius: 4px;
      padding: 14px 48px; cursor: pointer; transition: all 0.3s; display: inline-block;
      text-decoration: none;
    }
    .btn-primary:hover { background: var(--ink-cinnabar-deep); transform: translateY(-4px); box-shadow: 0 6px 16px rgba(184,51,42,0.3); }

    /* Footer */
    .footer {
      text-align: center; padding: 30px 0 40px; border-top: 2px solid var(--ink-ink);
      position: relative;
    }
    .footer::before {
      content: ''; position: absolute; top: 5px; left: 10%; right: 10%;
      border-bottom: 1px dashed var(--ink-cinnabar);
    }
    .footer-seal {
      font-family: 'ZCOOL QingKe HuangYou', cursive; font-size: 16px;
      letter-spacing: 0.5em; color: var(--ink-cinnabar); border: 2px solid var(--ink-cinnabar);
      padding: 8px 24px; display: inline-block; border-radius: 2px;
    }
    .footer-copy { font-size: 11px; color: var(--ink-mountain); margin-top: 12px; }
  </style>
</body>
</html>
