    <title>注册 - 声形绘 SOUND SHAPE</title>
    <style id="theme-vars">

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-foreground: var(--card-foreground);
  }
  @layer base {
    body { background: var(--card-background); color: var(--card-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;

      }

<body>
  <!-- Scanlines -->
  <div class="scanlines"></div>

  <!-- Particles -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Theme Toggle -->
  <button class="btn-theme-toggle" data-dom-id="btn-toggle-theme">墨画</button>

  <!-- Register Card -->
  <div class="register-card">
    <!-- Corners -->
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <!-- Logo -->
    <div class="logo-section">
      <div class="logo-text">SOUND SHAPE</div>
      <div class="logo-sub">create account</div>
      <div class="logo-divider"></div>
    </div>

    <!-- Form -->
    <div class="form-group">
      <label class="form-label">NICKNAME // 昵称</label>
      <input class="form-input" type="text" placeholder="your_name">
      <div class="form-error">NICKNAME REQUIRED</div>
    </div>

    <div class="form-group">
      <label class="form-label">EMAIL // 邮箱</label>
      <input class="form-input" type="email" placeholder="user@example.com">
      <div class="form-error">INVALID EMAIL FORMAT</div>
    </div>

    <div class="form-group">
      <label class="form-label">PASSWORD // 密码</label>
      <input class="form-input" type="password" placeholder="********">
      <div class="pw-strength">
        <div class="pw-bar active"></div>
        <div class="pw-bar active"></div>
        <div class="pw-bar warn"></div>
        <div class="pw-bar"></div>
      </div>
      <div class="pw-label">STRENGTH: MEDIUM</div>
    </div>

    <div class="form-group">
      <label class="form-label">CONFIRM PASSWORD // 确认密码</label>
      <input class="form-input" type="password" placeholder="********">
      <div class="form-error">PASSWORDS DO NOT MATCH</div>
    </div>

    <!-- Agreement -->
    <div class="agreement">
      注册即表示你同意 <a href="#">用户协议</a> 和 <a href="#">隐私政策</a><br>
      BY REGISTERING YOU AGREE TO THE <a href="#">TERMS</a> AND <a href="#">PRIVACY POLICY</a>
    </div>

    <!-- Submit -->
    <button class="btn-primary" data-dom-id="register-success">REGISTER</button>

    <!-- Login Link -->
    <a href="login-dark.html" class="form-link" data-dom-id="nav-login">
      HAVE ACCOUNT? <span>LOGIN</span>
    </a>
  </div>

    <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --th-bg: #050810;
      --th-bg-deep: #020407;
      --th-cyan: #00e5ff;
      --th-magenta: #ff2bd6;
      --th-amber: #ffb800;
      --th-green: #39ff7a;
      --th-line: rgba(0,229,255,.35);
      --th-text: #d6f7ff;
      --th-text-dim: #6a8a99;
    }
    html { font-size: 16px; }
    body {
      font-family: 'Share Tech Mono', monospace;
      background: var(--th-bg);
      color: var(--th-text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow-x: hidden; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none;
      border-radius: 0;
    }

    /* === Scanlines === */
    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 2;
      background: repeating-linear-gradient(0deg,
        rgba(0,229,255,.06) 0, rgba(0,229,255,.06) 1px,
        transparent 1px, transparent 3px);
    }
    .scanlines::after {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,.6) 100%);
    }

    /* === Particles === */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 3; }
    .particle {
      position: absolute; width: 2px; height: 2px; background: var(--th-cyan);
      border-radius: 50%; box-shadow: 0 0 6px var(--th-cyan);
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) translateX(40px); opacity: 0; }
    }
    .particle:nth-child(1) { left: 10%; animation-duration: 9s; animation-delay: 0s; }
    .particle:nth-child(2) { left: 30%; animation-duration: 12s; animation-delay: 2s; }
    .particle:nth-child(3) { left: 50%; animation-duration: 8s; animation-delay: 5s; }
    .particle:nth-child(4) { left: 68%; animation-duration: 11s; animation-delay: 1s; }
    .particle:nth-child(5) { left: 85%; animation-duration: 10s; animation-delay: 3s; }
    .particle:nth-child(6) { left: 42%; animation-duration: 7s; animation-delay: 4s; }

    /* === Theme Toggle === */
    .btn-theme-toggle {
      position: fixed; top: 14px; right: 14px; z-index: 10;
      background: transparent; border: 1px solid var(--th-line); color: var(--th-text-dim);
      font-family: 'Share Tech Mono', monospace; font-size: 11px; padding: 4px 10px;
      letter-spacing: 0.1em; cursor: pointer; border-radius: 0;
      transition: border-color .2s, color .2s;
    }
    .btn-theme-toggle:hover { border-color: var(--th-cyan); color: var(--th-cyan); }

    /* === Register Card === */
    .register-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px;
      padding: 36px 28px 32px;
      background: rgba(0,229,255,0.02);
      border: 1px solid var(--th-line);
      border-radius: 0;
      margin: 20px;
    }
    .register-card::before {
      content: ""; position: absolute; inset: 8px;
      border: 1px solid rgba(0,229,255,0.1);
      border-radius: 0; pointer-events: none;
    }

    /* === Logo === */
    .logo-section { text-align: center; margin-bottom: 28px; }
    .logo-text {
      font-size: 20px; color: var(--th-cyan); letter-spacing: 0.3em;
      text-shadow: 0 0 16px rgba(0,229,255,0.5);
      animation: logo-flicker 5s infinite;
    }
    @keyframes logo-flicker {
      0%, 95%, 100% { opacity: 1; text-shadow: 0 0 16px rgba(0,229,255,0.5); }
      96% { opacity: 0.85; text-shadow: 0 0 4px rgba(0,229,255,0.3); }
      97% { opacity: 1; text-shadow: 0 0 20px rgba(0,229,255,0.6); }
      98% { opacity: 0.9; }
    }
    .logo-sub {
      font-size: 11px; color: var(--th-text-dim); letter-spacing: 0.3em;
      margin-top: 6px; text-transform: uppercase;
    }
    .logo-divider {
      width: 60px; height: 1px; background: var(--th-cyan);
      margin: 16px auto 0; opacity: 0.5;
      box-shadow: 0 0 6px var(--th-cyan);
    }

    /* === Form === */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 10px; color: var(--th-text-dim);
      letter-spacing: 0.25em; text-transform: uppercase;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%; padding: 12px 14px;
      background: var(--th-bg-deep);
      border: 1px solid var(--th-line);
      color: var(--th-text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px; letter-spacing: 0.1em;
      border-radius: 0; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-input::placeholder {
      color: var(--th-text-dim); opacity: 0.5;
    }
    .form-input:focus {
      border-color: var(--th-cyan);
      box-shadow: 0 0 12px rgba(0,229,255,0.15);
    }
    .form-error {
      font-size: 11px; color: var(--th-magenta);
      letter-spacing: 0.1em; margin-top: 4px; opacity: 0;
    }

    /* === Password Strength === */
    .pw-strength {
      display: flex; gap: 4px; margin-top: 8px;
    }
    .pw-bar {
      flex: 1; height: 3px;
      background: var(--th-line);
      border-radius: 0;
      transition: background .2s;
    }
    .pw-bar.active { background: var(--th-cyan); box-shadow: 0 0 4px var(--th-cyan); }
    .pw-bar.warn { background: var(--th-amber); box-shadow: 0 0 4px var(--th-amber); }
    .pw-bar.error { background: var(--th-magenta); box-shadow: 0 0 4px var(--th-magenta); }
    .pw-label {
      font-size: 9px; color: var(--th-text-dim); letter-spacing: 0.15em;
      margin-top: 4px; text-align: right;
    }

    /* === Submit Button === */
    .btn-primary {
      display: block; width: 100%; padding: 16px;
      background: var(--th-cyan); color: var(--th-bg-deep);
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px; letter-spacing: 0.25em;
      text-transform: uppercase; text-decoration: none;
      border: none; border-radius: 0; cursor: pointer;
      transition: box-shadow .2s; margin-top: 8px;
    }
    .btn-primary:hover { box-shadow: 0 0 28px rgba(0,229,255,0.5); }

    /* === Links === */
    .form-link {
      display: block; text-align: center;
      margin-top: 16px;
      font-size: 12px; color: var(--th-text-dim);
      letter-spacing: 0.15em; text-decoration: none;
      transition: color .2s;
    }
    .form-link:hover { color: var(--th-cyan); }
    .form-link span { color: var(--th-cyan); }

    /* === Corner Deco === */
    .corner { position: absolute; width: 16px; height: 16px; }
    .corner::before, .corner::after {
      content: ""; position: absolute;
      background: var(--th-cyan);
    }
    .corner.tl { top: -1px; left: -1px; }
    .corner.tl::before { top: 0; left: 0; width: 16px; height: 1px; }
    .corner.tl::after { top: 0; left: 0; width: 1px; height: 16px; }
    .corner.tr { top: -1px; right: -1px; }
    .corner.tr::before { top: 0; right: 0; width: 16px; height: 1px; }
    .corner.tr::after { top: 0; right: 0; width: 1px; height: 16px; }
    .corner.bl { bottom: -1px; left: -1px; }
    .corner.bl::before { bottom: 0; left: 0; width: 16px; height: 1px; }
    .corner.bl::after { bottom: 0; left: 0; width: 1px; height: 16px; }
    .corner.br { bottom: -1px; right: -1px; }
    .corner.br::before { bottom: 0; right: 0; width: 16px; height: 1px; }
    .corner.br::after { bottom: 0; right: 0; width: 1px; height: 16px; }

    /* === Agreement === */
    .agreement {
      font-size: 10px; color: var(--th-text-dim);
      letter-spacing: 0.1em; line-height: 1.6;
      margin-top: 12px; padding: 10px;
      border: 1px solid var(--th-line);
      border-radius: 0;
      background: rgba(0,229,255,0.02);
    }
    .agreement a { color: var(--th-cyan); text-decoration: none; }
  </style>
</body>
</html>
