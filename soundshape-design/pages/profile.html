<!DOCTYPE html>

<head>

    <style id="theme-vars">
/* 墨画态 / 雷霆态 Design Tokens */

/* ========== INK (Light) Theme (default / :root) ========== */
:root {
  --background: #f3e9d2;
  --foreground: #1a1410;
  --card: #ede0c4;
  --card-foreground: #1a1410;
  --muted: #c9b896;
  --muted-foreground: #3d3328;
  --border: #c9b896;
  --input: #e2d4b0;
  --ring: #b8332a;
  --radius: 4px;
  --primary: #b8332a;
  --primary-foreground: #ffffff;
  --secondary: #a87b2c;
  --secondary-foreground: #ffffff;
  --accent: #4a5a6a;
  --accent-foreground: #ffffff;
  --destructive: #8a1f18;
  --destructive-foreground: #ffffff;

  --background-50: #f3e9d2;
  --background-100: #ede0c4;
  --background-200: #e2d4b0;
  --background-300: #c9b896;
  --background-400: #b09c7c;
  --background-500: #9a8568;
  --background-600: #7d6b52;
  --background-700: #6b5d4a;
  --background-800: #3d3328;
  --background-900: #1a1410;

  --brand-50: #f0d5d3;
  --brand-100: #e5b0ac;
  --brand-200: #d08a83;
  --brand-300: #b8332a;
  --brand-400: #b8332a;
  --brand-500: #b8332a;
  --brand-600: #8a1f18;
  --brand-700: #6c1812;

  --text-50: #f3e9d2;
  --text-100: #ede0c4;
  --text-200: #c9b896;
  --text-300: #9a8568;
  --text-400: #6b5d4a;
  --text-500: #3d3328;
  --text-600: #3d3328;
  --text-700: #2d2318;
  --text-800: #1a1410;
  --text-900: #0d0a08;

  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 18px;
}

/* ========== THUNDER (Dark) Theme ========== */
.dark {
  --background: #050810;
  --foreground: #d6f7ff;
  --card: #0a1020;
  --card-foreground: #d6f7ff;
  --muted: #0f1830;
  --muted-foreground: #6a8a99;
  --border: rgba(0, 229, 255, 0.35);
  --input: #050810;
  --ring: #00e5ff;
  --radius: 0px;
  --primary: #00e5ff;
  --primary-foreground: #020407;
  --secondary: #ff2bd6;
  --secondary-foreground: #020407;
  --accent: #ffb800;
  --accent-foreground: #020407;
  --destructive: #ff3366;
  --destructive-foreground: #020407;

  --background-50: #020407;
  --background-100: #050810;
  --background-200: #0a1020;
  --background-300: #0f1830;
  --background-400: #142040;
  --background-500: #1a2850;
  --background-600: #203060;
  --background-700: #264070;
  --background-800: #305090;
  --background-900: #5070b0;

  --brand-50: #e0f7ff;
  --brand-100: #b0eaff;
  --brand-200: #80ddff;
  --brand-300: #00e5ff;
  --brand-400: #00e5ff;
  --brand-500: #00e5ff;
  --brand-600: #00b8cc;
  --brand-700: #008a99;

  --text-50: #d6f7ff;
  --text-100: #c0e8ff;
  --text-200: #9ad4f0;
  --text-300: #6a8a99;
  --text-400: #4a6a7a;
  --text-500: #3a5a6a;
  --text-600: #2a4a5a;
  --text-700: #1a3a4a;
  --text-800: #0a2a3a;
  --text-900: #020407;

  --radius-sm: 0px;
  --radius-md: 0px;
  --radius-lg: 0px;
  --radius-xl: 0px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-foreground: var(--card-foreground);
  }
  @layer base {
    body { background: var(--card-background); color: var(--card-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
        <style>
      ::-webkit-scrollbar { width: 0 !important; height: 0 !important; }
      html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
  <div class="paper-grain"></div>
  <div class="page-content">
    <!-- Top Navigation -->
    <nav class="top-nav">
      <a href="home.html" class="nav-logo font-display" data-dom-id="nav-home">◆ 声形绘</a>
      <div class="nav-actions">
        <a href="login.html" class="nav-link">登录</a>
        <button class="btn-toggle-theme" data-dom-id="btn-toggle-theme">雷霆</button>
      </div>
    </nav>

    <!-- User Info -->
    <section class="user-section">
      <div class="user-avatar">墨</div>
      <div class="user-name">墨音居士</div>
      <div class="user-email">moyin@soundshape.cn</div>
    </section>

    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-num">壹</div>
        <div class="stat-badge">12</div>
        <div class="stat-label">创作数</div>
      </div>
      <div class="stat-box">
        <div class="stat-num">贰</div>
        <div class="stat-badge">3h</div>
        <div class="stat-label">演奏时长</div>
      </div>
      <div class="stat-box">
        <div class="stat-num">叁</div>
        <div class="stat-badge">5</div>
        <div class="stat-label">收藏乐器</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active">创作记录</button>
      <button class="tab-btn">调音历史</button>
      <button class="tab-btn">我的乐器</button>
    </div>

    <!-- Record List -->
    <div class="record-list">
      <div class="record-card" data-type="piano">
        <div class="record-top">
          <span class="record-instrument">🎹 钢琴</span>
          <span class="record-date">2026.06.28</span>
        </div>
        <div class="record-detail">画了一排方块，生成8键钢琴</div>
        <div class="record-duration">演奏时长 12分30秒</div>
      </div>

      <div class="record-card" data-type="guitar">
        <div class="record-top">
          <span class="record-instrument">🎸 吉他</span>
          <span class="record-date">2026.06.27</span>
        </div>
        <div class="record-detail">画了6条竖线，生成吉他弦位</div>
        <div class="record-duration">演奏时长 8分15秒</div>
      </div>

      <div class="record-card" data-type="violin">
        <div class="record-top">
          <span class="record-instrument">🎻 小提琴</span>
          <span class="record-date">2026.06.25</span>
        </div>
        <div class="record-detail">画了弧形线，生成4弦小提琴</div>
        <div class="record-duration">演奏时长 5分42秒</div>
      </div>

      <div class="record-card" data-type="drums">
        <div class="record-top">
          <span class="record-instrument">🥁 架子鼓</span>
          <span class="record-date">2026.06.22</span>
        </div>
        <div class="record-detail">画了5个圆，生成鼓面键位</div>
        <div class="record-duration">演奏时长 15分08秒</div>
      </div>
    </div>
  </div>

    <style>
    :root {
      --ink-paper: #f3e9d2;
      --ink-paper-edge: #e2d4b0;
      --ink-ink: #1a1410;
      --ink-ink-soft: #3d3328;
      --ink-cinnabar: #b8332a;
      --ink-cinnabar-deep: #8a1f18;
      --ink-gold: #a87b2c;
      --ink-mountain: #6b5d4a;
      --ink-water: #4a5a6a;
      --piano: #b8332a;
      --guitar: #a87b2c;
      --drums: #3d3328;
      --violin: #4a5a6a;
      --flute: #6b8e7a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Serif SC', serif;
      background: var(--ink-paper);
      color: var(--ink-ink);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none;
    }
    .font-display { font-family: 'Ma Shan Zheng', cursive; }
    .font-seal { font-family: 'ZCOOL QingKe HuangYou', cursive; letter-spacing: 0.3em; }

    .paper-grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.5;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.4  0 0 0 0 0.32  0 0 0 0 0.2  0 0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
      mix-blend-mode: multiply;
    }

    .page-content { position: relative; z-index: 2; width: 100%; padding: 0 20px; }

    /* Top Nav */
    .top-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; border-bottom: 2px solid var(--ink-ink); position: relative;
    }
    .top-nav::after {
      content: ''; position: absolute; bottom: 5px; left: 10%; right: 10%;
      border-bottom: 1px dashed var(--ink-cinnabar);
    }
    .nav-logo { font-family: 'Ma Shan Zheng', cursive; font-size: 22px; color: var(--ink-ink); text-decoration: none; }
    .nav-actions { display: flex; gap: 12px; align-items: center; }
    .nav-link {
      font-family: 'Noto Serif SC', serif; font-size: 13px; color: var(--ink-ink-soft);
      text-decoration: none; padding: 6px 12px; border: 1px solid var(--ink-paper-edge);
      border-radius: 4px; transition: all 0.3s;
    }
    .nav-link:hover { border-color: var(--ink-cinnabar); color: var(--ink-cinnabar); transform: translateY(-2px); }
    .btn-toggle-theme {
      font-family: 'ZCOOL QingKe HuangYou', cursive; font-size: 12px;
      letter-spacing: 0.2em; padding: 4px 14px; border-radius: 20px;
      border: 1.5px solid var(--ink-cinnabar); color: var(--ink-cinnabar);
      background: transparent; cursor: pointer; transition: all 0.3s;
    }
    .btn-toggle-theme:hover { background: var(--ink-cinnabar); color: #fff; }

    /* User Info Section */
    .user-section {
      text-align: center; padding: 30px 0 20px;
      border-bottom: 2px solid var(--ink-ink); position: relative;
    }
    .user-section::after {
      content: ''; position: absolute; bottom: 5px; left: 10%; right: 10%;
      border-bottom: 1px dashed var(--ink-cinnabar);
    }
    .user-avatar {
      width: 60px; height: 60px; border-radius: 50%;
      border: 2px solid var(--ink-ink); background: var(--ink-paper-edge);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px; position: relative;
      font-family: 'Ma Shan Zheng', cursive; font-size: 24px; color: var(--ink-ink-soft);
    }
    .user-avatar::after {
      content: ''; position: absolute; inset: 3px; border-radius: 50%;
      border: 1px dashed var(--ink-cinnabar); pointer-events: none;
    }
    .user-name {
      font-family: 'Ma Shan Zheng', cursive; font-size: 24px; color: var(--ink-ink);
      margin-bottom: 4px;
    }
    .user-email {
      font-size: 13px; color: var(--ink-mountain);
    }

    /* Stats Row */
    .stats-row {
      display: flex; gap: 10px; padding: 20px 0;
    }
    .stat-box {
      flex: 1; background: rgba(255,255,255,0.5);
      border: 2px solid var(--ink-ink); border-radius: 4px;
      text-align: center; padding: 14px 8px; position: relative;
      transition: all 0.3s;
    }
    .stat-box::after {
      content: ''; position: absolute; inset: 3px;
      border: 1px dashed var(--ink-cinnabar); pointer-events: none;
    }
    .stat-box:hover { transform: translateY(-3px); box-shadow: 0 3px 8px rgba(184,51,42,0.15); }
    .stat-num {
      font-family: 'Ma Shan Zheng', cursive; font-size: 28px;
      color: var(--ink-cinnabar); line-height: 1;
    }
    .stat-label {
      font-family: 'ZCOOL QingKe HuangYou', cursive; font-size: 10px;
      letter-spacing: 0.2em; color: var(--ink-mountain); margin-top: 6px;
    }
    .stat-badge {
      font-family: 'ZCOOL QingKe HuangYou', cursive; font-size: 9px;
      color: var(--ink-cinnabar); letter-spacing: 0.15em;
      margin-top: 4px;
    }

    /* Tabs */
    .tabs {
      display: flex; border-bottom: 2px solid var(--ink-ink);
      position: relative; margin-bottom: 16px;
    }
    .tabs::after {
      content: ''; position: absolute; bottom: 5px; left: 5%; right: 5%;
      border-bottom: 1px dashed var(--ink-cinnabar);
    }
    .tab-btn {
      flex: 1; padding: 10px 0; text-align: center;
      font-family: 'ZCOOL QingKe HuangYou', cursive; font-size: 12px;
      letter-spacing: 0.2em; color: var(--ink-ink-soft);
      background: transparent; border: none; cursor: pointer;
      transition: all 0.3s; position: relative;
    }
    .tab-btn.active {
      color: var(--ink-cinnabar);
    }
    .tab-btn.active::after {
      content: ''; position: absolute; bottom: -8px; left: 20%; right: 20%;
      height: 3px; background: var(--ink-cinnabar);
    }
    .tab-btn:hover { color: var(--ink-cinnabar); }

    /* Record List */
    .record-list { padding: 0 0 30px; }
    .record-card {
      background: rgba(255,255,255,0.5);
      border: 2px solid var(--ink-ink); border-radius: 4px;
      padding: 14px 16px; margin-bottom: 10px;
      position: relative; transition: all 0.3s;
    }
    .record-card::after {
      content: ''; position: absolute; inset: 3px;
      border: 1px dashed var(--ink-cinnabar); pointer-events: none;
    }
    .record-card:hover { transform: translateY(-3px); box-shadow: 0 3px 8px rgba(184,51,42,0.15); }
    .record-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px;
    }
    .record-instrument {
      font-family: 'Ma Shan Zheng', cursive; font-size: 18px; color: var(--ink-ink);
    }
    .record-date {
      font-family: 'ZCOOL QingKe HuangYou', cursive; font-size: 10px;
      letter-spacing: 0.15em; color: var(--ink-mountain);
    }
    .record-detail {
      font-size: 13px; color: var(--ink-ink-soft); line-height: 1.5;
    }
    .record-duration {
      font-family: 'ZCOOL QingKe HuangYou', cursive; font-size: 11px;
      color: var(--ink-gold); letter-spacing: 0.15em; margin-top: 4px;
    }
    .record-card[data-type="piano"] { border-left: 4px solid var(--piano); }
    .record-card[data-type="guitar"] { border-left: 4px solid var(--guitar); }
    .record-card[data-type="drums"] { border-left: 4px solid var(--drums); }
    .record-card[data-type="violin"] { border-left: 4px solid var(--violin); }
    .record-card[data-type="flute"] { border-left: 4px solid var(--flute); }

    /* Empty State */
    .empty-state {
      text-align: center; padding: 40px 20px;
      font-size: 14px; color: var(--ink-mountain);
    }
    .empty-icon { font-size: 36px; margin-bottom: 8px; display: block; }
  </style>
</body>
</html>
