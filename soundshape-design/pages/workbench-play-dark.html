    <style id="theme-vars">
/* 墨画态 / 雷霆态 Design Tokens */

/* ========== INK (Light) Theme (default / :root) ========== */
:root {
  --background: #f3e9d2;
  --foreground: #1a1410;
  --card: #ede0c4;
  --card-foreground: #1a1410;

  --secondary: #a87b2c;
  --secondary-foreground: #ffffff;

  --brand-200: #d08a83;
  --brand-300: #b8332a;
  --brand-400: #b8332a;

/* ========== THUNDER (Dark) Theme ========== */

  --foreground: #d6f7ff;
  --card: #0a1020;

  --primary-foreground: #020407;
  --secondary: #ff2bd6;
  --secondary-foreground: #020407;
  --accent: #ffb800;
  --accent-foreground: #020407;
  --destructive: #ff3366;
  --destructive-foreground: #020407;

  --background-50: #020407;
  --background-100: #050810;
  --background-200: #0a1020;
  --background-300: #0f1830;
  --background-400: #142040;
  --background-500: #1a2850;

  --background-700: #264070;
  --background-800: #305090;

  --radius-sm: 0px;
  --radius-md: 0px;
  --radius-lg: 0px;
  --radius-xl: 0px;
}

    <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --th-bg: #050810;
      --th-bg-deep: #020407;
      --th-cyan: #00e5ff;
      --th-magenta: #ff2bd6;
      --th-amber: #ffb800;
      --th-green: #39ff7a;
      --th-line: rgba(0,229,255,.35);
      --th-text: #d6f7ff;
      --th-text-dim: #6a8a99;
    }
    html, body { font-size: 16px; height: 100%; }
    body {
      font-family: 'Share Tech Mono', monospace;
      background: var(--th-bg-deep);
      color: var(--th-text);
      overflow-x: hidden; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none;
      border-radius: 0;
    }

    /* === Scanlines === */
    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 5;
      background: repeating-linear-gradient(0deg,
        rgba(0,229,255,.06) 0, rgba(0,229,255,.06) 1px,
        transparent 1px, transparent 3px);
    }
    .scanlines::after {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,.6) 100%);
    }

    /* === Particles === */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 6; }
    .particle {
      position: absolute; width: 2px; height: 2px; background: var(--th-cyan);
      border-radius: 50%; box-shadow: 0 0 6px var(--th-cyan);
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) translateX(40px); opacity: 0; }
    }
    .particle:nth-child(1) { left: 15%; animation-duration: 8s; animation-delay: 0s; }
    .particle:nth-child(2) { left: 30%; animation-duration: 10s; animation-delay: 2s; }
    .particle:nth-child(3) { left: 55%; animation-duration: 9s; animation-delay: 4s; }
    .particle:nth-child(4) { left: 75%; animation-duration: 11s; animation-delay: 1s; }
    .particle:nth-child(5) { left: 88%; animation-duration: 7s; animation-delay: 3s; }

    /* === Theme Toggle === */
    .btn-theme-toggle {
      position: fixed; top: 14px; right: 14px; z-index: 10;
      background: rgba(2,4,7,0.8); border: 1px solid var(--th-line); color: var(--th-text-dim);
      font-family: 'Share Tech Mono', monospace; font-size: 11px; padding: 4px 10px;
      letter-spacing: 0.1em; cursor: pointer; border-radius: 0;
      transition: border-color .2s, color .2s; z-index: 20;
    }
    .btn-theme-toggle:hover { border-color: var(--th-cyan); color: var(--th-cyan); }

    /* === Play Container === */
    .play-container {
      position: relative; z-index: 1;
      width: 100%; height: 100vh;
      display: flex; flex-direction: column;
    }

    /* === Camera Viewport (16:9) === */
    .camera-viewport {
      position: relative; flex: 1;
      background: var(--th-bg-deep);
      border-bottom: 1px solid var(--th-line);
      overflow: hidden;
    }
    .camera-viewport::before {
      content: ""; position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      perspective: 200px;
    }

    /* Perspective grid floor */
    .perspective-grid {
      position: absolute; bottom: 0; left: -20%; right: -20%;
      height: 40%; pointer-events: none;
      background:
        linear-gradient(transparent 0%, rgba(0,229,255,0.06) 100%),
        repeating-linear-gradient(
          90deg,
          transparent 0, transparent 39px,
          rgba(0,229,255,0.08) 39px, rgba(0,229,255,0.08) 40px
        );
      transform: perspective(200px) rotateX(60deg);
      transform-origin: bottom;
    }

    /* Holographic Piano Keys overlay */
    .holo-keys {
      position: absolute; bottom: 60px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 3px;
      z-index: 3;
    }
    .holo-key {
      width: 32px; height: 80px;
      background: rgba(0,229,255,0.06);
      border: 1px solid var(--th-cyan);
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 8px;
      border-radius: 0;
      transition: background .1s, box-shadow .1s;
    }
    .holo-key.active {
      background: rgba(0,229,255,0.25);
      box-shadow: 0 0 24px rgba(0,229,255,0.6), inset 0 0 12px rgba(0,229,255,0.3);
      border-color: var(--th-cyan);
    }
    .holo-key-note { font-size: 10px; color: var(--th-cyan); }
    .holo-key-black {
      width: 22px; height: 50px; margin-left: -10px; margin-right: -10px;
      background: rgba(0,229,255,0.03);
      border-color: rgba(0,229,255,0.5);
      z-index: 4;
    }
    .holo-key-black .holo-key-note { font-size: 8px; }

    /* Hand Skeleton SVG */
    .hand-skeleton {
      position: absolute; bottom: 80px; left: 50%;
      transform: translateX(-30%);
      z-index: 2; opacity: 0.9;
    }
    .skeleton-line {
      stroke: var(--th-cyan); stroke-width: 2;
      fill: none; stroke-linecap: square;
    }
    .skeleton-joint {
      fill: var(--th-cyan); width: 4px; height: 4px;
    }
    .fingertip {
      fill: var(--th-amber); width: 6px; height: 6px;
      filter: drop-shadow(0 0 6px var(--th-amber));
      animation: tip-glow 1.5s ease-in-out infinite;
    }
    @keyframes tip-glow {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    /* Particle Burst */
    .burst {
      position: absolute; width: 30px; height: 30px;
      z-index: 4; pointer-events: none;
    }
    .burst-particle {
      position: absolute; width: 3px; height: 3px;
      background: var(--th-cyan); border-radius: 50%;
      box-shadow: 0 0 8px var(--th-cyan);
      animation: burstOut 0.6s ease-out forwards;
    }
    .burst-particle:nth-child(1) { animation-delay: 0s; }
    .burst-particle:nth-child(2) { animation-delay: 0.05s; }
    .burst-particle:nth-child(3) { animation-delay: 0.1s; }
    .burst-particle:nth-child(4) { animation-delay: 0.15s; }
    .burst-particle:nth-child(5) { animation-delay: 0.2s; }
    .burst-particle:nth-child(6) { animation-delay: 0.1s; }
    @keyframes burstOut {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }
    .burst-particle:nth-child(1) { --dx: -15px; --dy: -12px; }
    .burst-particle:nth-child(2) { --dx: 12px; --dy: -15px; }
    .burst-particle:nth-child(3) { --dx: -8px; --dy: -18px; }
    .burst-particle:nth-child(4) { --dx: 16px; --dy: -6px; }
    .burst-particle:nth-child(5) { --dx: 0px; --dy: -20px; }
    .burst-particle:nth-child(6) { --dx: 10px; --dy: -14px; }

    /* === HUD Overlay === */
    .hud {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: flex-start;
      z-index: 4; pointer-events: none;
    }
    .hud-item {
      font-size: 10px; letter-spacing: 0.15em;
      padding: 6px 10px;
      background: rgba(2,4,7,0.7);
      border: 1px solid var(--th-line);
      border-radius: 0;
    }
    .hud-item.hand-tracked {
      color: var(--th-green);
      border-color: var(--th-green);
      box-shadow: 0 0 8px rgba(57,255,122,0.2);
    }
    .hud-item .dot {
      display: inline-block; width: 6px; height: 6px;
      background: var(--th-green); margin-right: 6px;
      box-shadow: 0 0 6px var(--th-green);
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .hud-item.finger-info { color: var(--th-cyan); }
    .hud-item.latency { color: var(--th-amber); }
    .hud-item.latency span { color: var(--th-green); }

    /* === Bottom Controls === */
    .bottom-controls {
      position: relative; z-index: 4;
      padding: 16px 20px 24px;
      background: var(--th-bg);
      border-top: 1px solid var(--th-line);
    }
    .control-row {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 12px;
    }
    .control-row:last-child { margin-bottom: 0; }
    .control-label {
      font-size: 10px; color: var(--th-text-dim);
      letter-spacing: 0.2em; min-width: 64px;
      text-transform: uppercase;
    }
    .control-slider {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 4px;
      background: var(--th-line);
      border-radius: 0; outline: none;
      cursor: pointer;
    }
    .control-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 16px; height: 16px;
      background: var(--th-cyan);
      border: none; border-radius: 0;
      box-shadow: 0 0 8px var(--th-cyan);
      cursor: pointer;
    }
    .control-slider.amber::-webkit-slider-thumb {
      background: var(--th-amber);
      box-shadow: 0 0 8px var(--th-amber);
    }
    .control-slider.amber {
      background: rgba(255,184,0,0.2);
    }
    .control-value {
      font-size: 11px; color: var(--th-cyan);
      min-width: 40px; text-align: right;
      letter-spacing: 0.1em;
    }
    .control-value.amber { color: var(--th-amber); }

    /* === Bottom Action Bar === */
    .bottom-bar {
      display: flex; gap: 12px; padding: 12px 20px;
      background: var(--th-bg);
      border-top: 1px solid var(--th-line);
    }
    .btn-back {
      flex: 1; padding: 14px;
      background: transparent; color: var(--th-cyan);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px; letter-spacing: 0.15em;
      text-transform: uppercase; text-decoration: none;
      border: 1px solid var(--th-cyan); border-radius: 0;
      cursor: pointer; text-align: center;
      transition: box-shadow .2s;
    }
    .btn-back:hover { box-shadow: 0 0 12px rgba(0,229,255,0.3); }
    .btn-finish {
      flex: 1; padding: 14px;
      background: var(--th-cyan); color: var(--th-bg-deep);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px; letter-spacing: 0.15em;
      text-transform: uppercase; text-decoration: none;
      border: none; border-radius: 0;
      cursor: pointer; text-align: center;
      transition: box-shadow .2s;
    }
    .btn-finish:hover { box-shadow: 0 0 20px rgba(0,229,255,0.5); }

    /* === Recording Indicator === */
    .rec-indicator {
      position: absolute; top: 12px; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 8px;
      padding: 6px 16px;
      background: rgba(255,43,214,0.15);
      border: 1px solid var(--th-magenta);
      border-radius: 0; z-index: 4;
    }
    .rec-dot {
      width: 8px; height: 8px;
      background: var(--th-magenta);
      box-shadow: 0 0 8px var(--th-magenta);
      animation: rec-blink 1s infinite;
    }
    @keyframes rec-blink {
