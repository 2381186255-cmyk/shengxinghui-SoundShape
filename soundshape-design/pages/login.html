<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声形绘 - 登录</title>
    <style id="theme-vars">
/* 墨画态 / 雷霆态 Design Tokens */

/* ========== INK (Light) Theme (default / :root) ========== */
:root {
  --background: #f3e9d2;
  --foreground: #1a1410;
  --card: #ede0c4;
  --card-foreground: #1a1410;
  --muted: #c9b896;
  --muted-foreground: #3d3328;
  --border: #c9b896;
  --input: #e2d4b0;
  --ring: #b8332a;
  --radius: 4px;
  --primary: #b8332a;
  --primary-foreground: #ffffff;
  --secondary: #a87b2c;
  --secondary-foreground: #ffffff;
  --accent: #4a5a6a;
  --accent-foreground: #ffffff;
  --destructive: #8a1f18;
  --destructive-foreground: #ffffff;

  --background-50: #f3e9d2;
  --background-100: #ede0c4;
  --background-200: #e2d4b0;
  --background-300: #c9b896;
  --background-400: #b09c7c;
  --background-500: #9a8568;
  --background-600: #7d6b52;
  --background-700: #6b5d4a;
  --background-800: #3d3328;
  --background-900: #1a1410;

  --brand-50: #f0d5d3;
  --brand-100: #e5b0ac;
  --brand-200: #d08a83;
  --brand-300: #b8332a;
  --brand-400: #b8332a;
  --brand-500: #b8332a;
  --brand-600: #8a1f18;
  --brand-700: #6c1812;

  --text-50: #f3e9d2;
  --text-100: #ede0c4;
  --text-200: #c9b896;
  --text-300: #9a8568;
  --text-400: #6b5d4a;
  --text-500: #3d3328;
  --text-600: #3d3328;
  --text-700: #2d2318;
  --text-800: #1a1410;
  --text-900: #0d0a08;

  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 18px;
}

/* ========== THUNDER (Dark) Theme ========== */
.dark {
  --background: #050810;
  --foreground: #d6f7ff;
  --card: #0a1020;
  --card-foreground: #d6f7ff;
  --muted: #0f1830;
  --muted-foreground: #6a8a99;
  --border: rgba(0, 229, 255, 0.35);
  --input: #050810;
  --ring: #00e5ff;
  --radius: 0px;
  --primary: #00e5ff;
  --primary-foreground: #020407;
  --secondary: #ff2bd6;
  --secondary-foreground: #020407;
  --accent: #ffb800;
  --accent-foreground: #020407;
  --destructive: #ff3366;
  --destructive-foreground: #020407;

  --background-50: #020407;
  --background-100: #050810;
  --background-200: #0a1020;
  --background-300: #0f1830;
  --background-400: #142040;
  --background-500: #1a2850;
  --background-600: #203060;
  --background-700: #264070;
  --background-800: #305090;
  --background-900: #5070b0;

  --brand-50: #e0f7ff;
  --brand-100: #b0eaff;
  --brand-200: #80ddff;
  --brand-300: #00e5ff;
  --brand-400: #00e5ff;
  --brand-500: #00e5ff;
  --brand-600: #00b8cc;
  --brand-700: #008a99;

  --text-50: #d6f7ff;
  --text-100: #c0e8ff;
  --text-200: #9ad4f0;
  --text-300: #6a8a99;
  --text-400: #4a6a7a;
  --text-500: #3a5a6a;
  --text-600: #2a4a5a;
  --text-700: #1a3a4a;
  --text-800: #0a2a3a;
  --text-900: #020407;

  --radius-sm: 0px;
  --radius-md: 0px;
  --radius-lg: 0px;
  --radius-xl: 0px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-foreground: var(--card-foreground);
  }
  @layer base {
    body { background: var(--card-background); color: var(--card-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
        <style>
      ::-webkit-scrollbar { width: 0 !important; height: 0 !important; }
      html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
  <div class="paper-grain"></div>
  <div class="theme-toggle-fixed">
    <button class="btn-toggle-theme" data-dom-id="btn-toggle-theme">雷霆</button>
  </div>
  <div class="page-content">
    <a href="home.html" class="back-link" data-dom-id="nav-home">← 首页</a>

    <div class="login-card">
      <div class="card-seal font-seal">墨印登录</div>

      <div class="login-logo">
        <div class="login-logo-text font-display">声形绘</div>
      </div>
      <p class="login-subtitle">登录以保存你的创作</p>

      <div class="form-group">
        <label class="form-label font-seal">邮箱</label>
        <input type="email" class="form-input" placeholder="请输入邮箱地址" data-dom-id="login-success">
      </div>
      <div class="form-group">
        <label class="form-label font-seal">密码</label>
        <input type="password" class="form-input" placeholder="请输入密码">
      </div>

      <button class="btn-primary" data-dom-id="login-success">登录</button>

      <div class="register-link">
        还没有账号？<a href="register.html" data-dom-id="goto-register">注册一个</a>
      </div>
    </div>
  </div>

    <style>
    :root {
      --ink-paper: #f3e9d2;
      --ink-paper-edge: #e2d4b0;
      --ink-ink: #1a1410;
      --ink-ink-soft: #3d3328;
      --ink-cinnabar: #b8332a;
      --ink-cinnabar-deep: #8a1f18;
      --ink-gold: #a87b2c;
      --ink-mountain: #6b5d4a;
      --ink-water: #4a5a6a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Serif SC', serif;
      background: var(--ink-paper);
      color: var(--ink-ink);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none;
      display: flex; align-items: center; justify-content: center;
    }
    .font-display { font-family: 'Ma Shan Zheng', cursive; }
    .font-seal { font-family: 'ZCOOL QingKe HuangYou', cursive; letter-spacing: 0.3em; }

    .paper-grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.5;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.4  0 0 0 0 0.32  0 0 0 0 0.2  0 0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
      mix-blend-mode: multiply;
    }

    .page-content { position: relative; z-index: 2; width: 100%; padding: 0 20px; }

    /* Theme toggle fixed */
    .theme-toggle-fixed {
      position: fixed; top: 16px; right: 16px; z-index: 10;
    }
    .btn-toggle-theme {
      font-family: 'ZCOOL QingKe HuangYou', cursive; font-size: 12px;
      letter-spacing: 0.2em; padding: 4px 14px; border-radius: 20px;
      border: 1.5px solid var(--ink-cinnabar); color: var(--ink-cinnabar);
      background: var(--ink-paper); cursor: pointer; transition: all 0.3s;
    }
    .btn-toggle-theme:hover { background: var(--ink-cinnabar); color: #fff; }

    /* Back Link */
    .back-link {
      display: inline-block; margin-bottom: 20px;
      font-family: 'Noto Serif SC', serif; font-size: 13px;
      color: var(--ink-ink-soft); text-decoration: none;
      transition: all 0.3s;
    }
    .back-link:hover { color: var(--ink-cinnabar); }

    /* Login Card */
    .login-card {
      background: rgba(255,255,255,0.6);
      border: 2px solid var(--ink-ink);
      border-radius: 4px;
      padding: 40px 32px;
      position: relative;
    }
    .login-card::after {
      content: ''; position: absolute; inset: 5px;
      border: 1px dashed var(--ink-cinnabar); pointer-events: none;
    }

    /* Logo */
    .login-logo {
      text-align: center; margin-bottom: 8px;
    }
    .login-logo-text {
      font-family: 'Ma Shan Zheng', cursive; font-size: 42px;
      color: var(--ink-ink); line-height: 1.2;
    }
    .login-subtitle {
      text-align: center; font-size: 14px;
      color: var(--ink-mountain); margin-bottom: 32px;
    }

    /* Form Fields */
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block; font-family: 'ZCOOL QingKe HuangYou', cursive;
      font-size: 12px; letter-spacing: 0.3em; color: var(--ink-ink-soft);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%; padding: 12px 14px;
      background: var(--ink-paper-edge);
      border: 1.5px solid var(--ink-ink);
      border-radius: 4px; font-family: 'Noto Serif SC', serif;
      font-size: 15px; color: var(--ink-ink);
      outline: none; transition: all 0.3s;
    }
    .form-input:focus {
      border-color: var(--ink-cinnabar);
      box-shadow: 0 0 0 3px rgba(184,51,42,0.1);
    }
    .form-input::placeholder { color: var(--ink-mountain); opacity: 0.6; }

    /* Primary Button */
    .btn-primary {
      font-family: 'Ma Shan Zheng', cursive; font-size: 20px;
      letter-spacing: 0.15em; background: var(--ink-cinnabar);
      color: #fff; border: none; border-radius: 4px;
      padding: 14px 24px; cursor: pointer; transition: all 0.3s;
      display: block; width: 100%; text-align: center; text-decoration: none;
    }
    .btn-primary:hover {
      background: var(--ink-cinnabar-deep); transform: translateY(-4px);
      box-shadow: 0 6px 16px rgba(184,51,42,0.3);
    }

    /* Register Link */
    .register-link {
      text-align: center; margin-top: 20px; font-size: 13px;
      color: var(--ink-mountain);
    }
    .register-link a {
      color: var(--ink-cinnabar); text-decoration: none;
      border-bottom: 1px dashed var(--ink-cinnabar);
      transition: all 0.3s;
    }
    .register-link a:hover { color: var(--ink-cinnabar-deep); }

    /* Decorative seal */
    .card-seal {
      position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
      background: var(--ink-paper); padding: 2px 20px;
      font-family: 'ZCOOL QingKe HuangYou', cursive; font-size: 10px;
      letter-spacing: 0.5em; color: var(--ink-cinnabar);
      border: 1.5px solid var(--ink-cinnabar); border-radius: 2px;
      z-index: 3;
    }
  </style>
</body>
</html>
